<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeighborRent – Dhaka Rental & Resale Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="topbar">
  <a href="index.html" class="logo">
    <span class="logo-text">Porshi<span>Share</span></span>
  </a>
  <div class="nav-links" id="nav-public">
    <a href="browse.html" class="nav-link">Browse</a>
    <a href="trending.html" class="nav-link">Trending</a>
    <a href="messages.html" class="nav-link">Messages</a>
  </div>
  <div class="nav-right" id="nav-right-public">
    <a href="signin.html" class="btn btn-outline btn-sm">Sign In</a>
    <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
  </div>
</nav>
<div id="page-signup" class="page-section active">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <span class="logo-text u-inline-029">Neighbor<span>Rent</span></span>
      </div>
      <div class="step-indicator">
        <div class="step done"><div class="step-num">✓</div></div>
        <div class="step-line"></div>
        <div class="step active"><div class="step-num">2</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">3</div></div>
      </div>
      <div class="auth-title">Create Your Account</div>
      <div class="auth-sub">Join thousands of neighbors sharing in Dhaka</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" type="text" placeholder="Rahim Uddin">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" type="tel" placeholder="01XXXXXXXXX">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" placeholder="you@email.com">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select class="form-select">
            <option>Select</option><option>Male</option><option>Female</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <input class="form-input" type="date">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">I want to</label>
        <div class="type-toggle">
          <div class="type-opt active" onclick="toggleType(this)">Rent Items</div>
          <div class="type-opt" onclick="toggleType(this)">Sell Items</div>
          <div class="type-opt" onclick="toggleType(this)">Both</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Neighborhood Block</label>
        <select class="form-select">
          <option>Select your block…</option>
          <option>Dhanmondi Block 1</option><option>Dhanmondi Block 2</option>
          <option>Gulshan 1</option><option>Gulshan 2</option>
          <option>Mirpur 10</option><option>Mirpur 12</option>
          <option>Uttara Sector 7</option><option>Uttara Sector 11</option>
          <option>Bashundhara</option><option>Mohammadpur</option>
        </select>
        <div class="form-hint">This determines your free pickup zone</div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" placeholder="Min 8 chars">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" type="password" placeholder="Repeat password">
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="location.href='dashboard.html'">Create Account →</button>
      <div class="auth-link">Already have an account? <a href="signin.html">Sign in</a></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     PAGE: SIGNIN
══════════════════════════════════════════ -->
<script src="scripts.js"></script>
</body>
</html>
